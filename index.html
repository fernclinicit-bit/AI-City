<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City AI Applications</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Clouds -->
    <div class="clouds"></div>

    <div class="header">
        <h1>Smart City AI Applications</h1>
    </div>

    <!-- Main Container for Isometric Scene -->
    <div class="scene">
        
        <!-- Background SVG Lines connecting nodes -->
        <svg class="data-lines" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">
            <!-- Lines will be drawn via CSS or JS to match positions, but for simplicity we draw abstract glowing lines -->
            <path class="line" d="M 250,250 L 500,450" />
            <path class="line" d="M 500,200 L 500,450" />
            <path class="line" d="M 800,250 L 500,450" />
            <path class="line" d="M 200,600 L 500,450" />
            <path class="line" d="M 500,700 L 500,450" />
            <path class="line" d="M 800,600 L 500,450" />
            <!-- Animated data packets along paths -->
            <circle class="packet p1" cx="0" cy="0" r="5" />
            <circle class="packet p2" cx="0" cy="0" r="5" />
            <circle class="packet p3" cx="0" cy="0" r="5" />
            <circle class="packet p4" cx="0" cy="0" r="5" />
            <circle class="packet p5" cx="0" cy="0" r="5" />
            <circle class="packet p6" cx="0" cy="0" r="5" />
        </svg>

        <div class="isometric-world">
            
            <!-- CENTRAL BRAIN -->
            <div class="platform central-brain" style="top: 45%; left: 45%;">
                <div class="brain-icon">
                    <svg viewBox="0 0 64 64" width="80" height="80">
                        <path d="M32 12 C18 12 8 22 8 36 C8 48 20 56 32 56 C44 56 56 48 56 36 C56 22 46 12 32 12 Z" fill="none" stroke="#00f0ff" stroke-width="3"/>
                        <path d="M32 12 L32 56 M16 28 Q32 20 48 28 M14 40 Q32 32 50 40 M24 16 L24 24 M40 16 L40 24 M20 46 L24 50 M44 46 L40 50" stroke="#00f0ff" stroke-width="2" fill="none"/>
                    </svg>
                </div>
            </div>

            <!-- 1. TRAFFIC MANAGEMENT -->
            <div class="platform p-traffic" style="top: 15%; left: 10%;">
                <div class="label">TRAFFIC MANAGEMENT</div>
                <div class="base road">
                    <!-- Cars -->
                    <div class="car c1"></div>
                    <div class="car c2"></div>
                    <div class="car c3"></div>
                    <!-- Traffic Lights -->
                    <div class="traffic-light tl-left"></div>
                    <div class="traffic-light tl-right"></div>
                </div>
            </div>

            <!-- 2. SECURITY -->
            <div class="platform p-security" style="top: 5%; left: 45%;">
                <div class="label">SECURITY</div>
                <div class="base park">
                    <div class="building block b-small"></div>
                    <div class="building block b-tall"></div>
                    <div class="tree t1"></div>
                    <div class="tree t2"></div>
                    <div class="camera-pole"></div>
                </div>
            </div>

            <!-- 3. SECURITY SURVEILLANCE -->
            <div class="platform p-surveillance" style="top: 15%; left: 75%;">
                <div class="label">SECURITY SURVEILLANCE</div>
                <div class="base tech">
                    <div class="server s1"></div>
                    <div class="server s2"></div>
                    <div class="van"></div>
                    <div class="camera-pole cp1"></div>
                    <div class="camera-pole cp2"></div>
                </div>
            </div>

            <!-- 4. PARKING SYSTEM -->
            <div class="platform p-parking" style="top: 60%; left: 10%;">
                <div class="label">PARKING SYSTEM</div>
                <div class="base grid">
                    <div class="parking-spot ps1"><div class="wifi-icon"></div></div>
                    <div class="parking-spot ps2"><div class="wifi-icon"></div></div>
                    <div class="parking-spot ps3"><div class="wifi-icon"></div></div>
                    <div class="parking-spot ps4"><div class="wifi-icon"></div></div>
                    <div class="gate"></div>
                </div>
            </div>

            <!-- 5. UTILITY MONITORING -->
            <div class="platform p-utility" style="top: 75%; left: 45%;">
                <div class="label">UTILITY MONITORING</div>
                <div class="base city">
                    <div class="building b-main"></div>
                    <div class="building b-water"></div>
                    <div class="building b-power"></div>
                    <!-- Utility icons floating -->
                    <div class="u-icon water"></div>
                    <div class="u-icon power"></div>
                    <div class="u-icon eco"></div>
                </div>
            </div>

            <!-- 6. PUBLIC SAFETY & ENVIRONMENTAL -->
            <div class="platform p-safety" style="top: 60%; left: 75%;">
                <div class="label">PUBLIC SAFETY<br>ENVIRONMENTAL</div>
                <div class="base dark">
                    <div class="ambulance"></div>
                    <div class="crowd">
                        <div class="person"></div><div class="person"></div><div class="person"></div>
                        <div class="person"></div><div class="person"></div><div class="person"></div>
                    </div>
                    <div class="antenna a1"></div>
                    <div class="antenna a2"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
