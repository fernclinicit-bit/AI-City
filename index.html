<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#163d35">
  <title>AI City — เมืองทีมงานอัจฉริยะ</title>
  <meta name="description" content="ศูนย์รวมทีม AI แยกตามแผนกในรูปแบบเมืองเกมแบบโต้ตอบ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <a class="brand" href="#" aria-label="AI City หน้าหลัก">
        <span class="brand-mark">AI</span>
        <span><b>AI CITY</b><small>เมืองที่ทีม AI ทำงานให้คุณ</small></span>
      </a>
      <div class="city-status">
        <span class="live-dot"></span>
        <span><b id="activeCount">18</b> AI กำลังทำงาน</span>
        <span class="clock" id="clock">08:34</span>
      </div>
      <button class="profile" type="button" aria-label="เปิดโปรไฟล์">ฟ</button>
    </header>

    <section class="map-shell" aria-label="แผนที่เมือง AI">
      <div class="map" id="map">
        <img src="assets/ai-city.png" alt="เมืองสำนักงาน AI แบบไอโซเมตริก" draggable="false">
        <div class="warm-overlay"></div>
        <div id="walkers" aria-hidden="true"></div>

        <button class="department content" data-dept="content" style="--x:25%;--y:23%">
          <span class="pin">🎬</span><span class="dept-label"><b>สตูดิโอคอนเทนต์</b><small>CONTENT STUDIO</small></span>
        </button>
        <button class="department marketing" data-dept="marketing" style="--x:68%;--y:22%">
          <span class="pin">📣</span><span class="dept-label"><b>การตลาด</b><small>MARKETING LAB</small></span>
        </button>
        <button class="department automation" data-dept="automation" style="--x:15%;--y:49%">
          <span class="pin">⚙️</span><span class="dept-label"><b>ระบบอัตโนมัติ</b><small>AUTOMATION WORKS</small></span>
        </button>
        <button class="department sales" data-dept="sales" style="--x:86%;--y:48%">
          <span class="pin">🛍️</span><span class="dept-label"><b>ฝ่ายขาย</b><small>SALES GUILD</small></span>
        </button>
        <button class="department data" data-dept="data" style="--x:30%;--y:76%">
          <span class="pin">📊</span><span class="dept-label"><b>ศูนย์ข้อมูล</b><small>DATA LAB</small></span>
        </button>
        <button class="department care" data-dept="care" style="--x:72%;--y:76%">
          <span class="pin">💬</span><span class="dept-label"><b>ดูแลลูกค้า</b><small>CUSTOMER CARE</small></span>
        </button>
        <button class="department core" data-dept="core" style="--x:50%;--y:48%">
          <span class="core-ring"></span><span class="dept-label"><b>ศูนย์บัญชาการ AI</b><small>AI COMMAND CENTER</small></span>
        </button>

        <div class="map-tip">คลิกอาคารเพื่อดูทีมงาน</div>
        <div class="zoom-controls" aria-label="ควบคุมแผนที่">
          <button id="zoomIn" type="button" aria-label="ขยาย">+</button>
          <button id="zoomOut" type="button" aria-label="ย่อ">−</button>
        </div>
      </div>
    </section>

    <nav class="bottom-dock" aria-label="เมนูหลัก">
      <button class="active"><span>🏡</span>เมืองของฉัน</button>
      <button><span>📋</span>งานทั้งหมด<i>7</i></button>
      <button><span>🤖</span>ทีม AI</button>
      <button><span>📈</span>รายงาน</button>
    </nav>
  </main>

  <aside class="panel" id="panel" aria-hidden="true">
    <button class="close" id="closePanel" type="button" aria-label="ปิด">×</button>
    <div class="panel-icon" id="panelIcon">🎬</div>
    <p class="eyebrow" id="panelEn">CONTENT STUDIO</p>
    <h2 id="panelTitle">สตูดิโอคอนเทนต์</h2>
    <p id="panelDesc">สร้างโพสต์ บทความ วิดีโอ และภาพสำหรับทุกช่องทาง</p>
    <div class="stats">
      <div><b id="taskCount">12</b><span>งานวันนี้</span></div>
      <div><b id="agentCount">3</b><span>AI ประจำการ</span></div>
    </div>
    <h3>ทีม AI ประจำแผนก</h3>
    <div class="agents" id="agents"></div>
    <button class="primary" id="startTask" type="button">+ มอบหมายงานใหม่</button>
  </aside>
  <div class="scrim" id="scrim"></div>
  <div class="toast" id="toast" role="status">ส่งงานให้ทีม AI แล้ว ✓</div>

  <script src="script.js"></script>
</body>
</html>
